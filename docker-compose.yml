services:
  db:
    image: postgres:16-alpine
    container_name: respect_db
    environment:
      POSTGRES_USER: respect
      POSTGRES_PASSWORD: respect
      POSTGRES_DB: respect
    ports:
      - "5433:5432"   # 5433 на хосте, чтобы не конфликтовать с другим локальным Postgres
    volumes:
      - respect_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U respect"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  respect_pgdata:
