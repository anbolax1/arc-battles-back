name: Deploy backend

# Автодеплой: сборка статического бинаря на раннере → заливка на VPS → рестарт.
# Миграции БД прогоняются бинарём на старте. Требуются секреты репозитория:
#   SSH_HOST  — IP/домен VPS (напр. 155.212.133.147)
#   SSH_USER  — admin2
#   SSH_KEY   — приватный deploy-ключ (целиком, включая BEGIN/END строки)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux binary
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o server-linux.new ./cmd/server

      - name: Upload binary (alongside running one)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: server-linux.new
          target: back

      - name: Swap & restart (migrations run on startup)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            chmod +x ~/back/server-linux.new
            mv -f ~/back/server-linux.new ~/back/server-linux
            systemctl --user restart respect-back
            sleep 2
            curl -fsS localhost:8080/api/health
            echo
            journalctl --user -u respect-back -n 10 --no-pager | grep -iE "goose|migrat|version" || true
